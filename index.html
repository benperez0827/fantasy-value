}

  var graded=P.filter(function(p){return p.status==='win'||p.status==='loss';});
  var pend=P.filter(function(p){return p.status==='pending';}).length;
  function stats(list){var w=0,l=0,u=0;list.forEach(function(p){if(p.status==='win')w++;else if(p.status==='loss')l++;u+=(p.units||0);});var n=w+l;return {w:w,l:l,u:u,roi:n?100*u/n:0};}
  function uc(u){return u>=0?'#0d7d4d':'#b3402f';}
  function card(t,st){return '<div class="gcard" style="border-left-color:'+uc(st.u)+'"><div class="mk">'+t+'</div><div class="pl" style="color:'+uc(st.u)+'">'+(st.u>=0?'+':'')+st.u.toFixed(2)+'u</div><div class="dt2">'+st.w+'W&ndash;'+st.l+'L &middot; ROI '+(st.roi>=0?'+':'')+st.roi.toFixed(1)+'%</div></div>';}
  var html='<div class="gnote">Paper backtest &mdash; <b>1 unit flat</b> on every Top Play (the model&#39;s side) at the recorded odds, graded from final MLB box scores. Days before live tracking use closing lines. For evaluation only; not financial advice.</div>';
  html+='<div class="gcards">'+card('All Top Plays',stats(graded))+card('Positive-Edge Only',stats(graded.filter(function(p){return p.edge!=null&&p.edge>0;})));
  ['Hits / TB','Total Bases','Home Run','Pitcher K','Pitcher Outs','Pitcher ER'].forEach(function(mk){html+=card(mk,stats(graded.filter(function(p){return p.market===mk;})));});
  html+='</div>';
  var seq=graded.slice().sort(function(a,b){return a.date<b.date?-1:a.date>b.date?1:0;});
  var cum=0,pts=seq.map(function(p){cum+=(p.units||0);return cum;});
  html+=equitySVG(pts);
  var rows=P.slice().sort(function(a,b){return a.date<b.date?1:(a.date>b.date?-1:0);});
  html+='<div class="tablewrap" style="max-height:60vh"><table><thead><tr><th class="l">Date</th><th class="l">Market</th><th class="name l">Player</th><th class="l">Bet</th><th>Odds</th><th>Edge</th><th>Stat</th><th>Result</th><th>Units</th></tr></thead><tbody>';
  rows.forEach(function(p){var st=p.status; var rc=st==='win'?'#0d7d4d':st==='loss'?'#b3402f':'#9aa3ad'; var ru=p.units==null?'':((p.units>0?'+':'')+(+p.units).toFixed(2)); var rtxt=st==='pending'?'pending':st==='void'?'void':(st==='win'?'WIN':'LOSS'); var ed=(p.edge==null?'':((p.edge>0?'+':'')+p.edge.toFixed(1)+'%'));
    html+='<tr><td class="l">'+p.date.slice(5)+'</td><td class="l">'+p.market+'</td><td class="name l">'+p.player+'</td><td class="l">'+p.side+'</td><td>'+(p.odds!=null?((p.odds>0?'+':'')+p.odds):'')+'</td><td style="color:'+(p.edge>0?'#0d7d4d':'#b3402f')+'">'+ed+'</td><td>'+(p.result==null?'':p.result)+'</td><td style="color:'+rc+';font-weight:700">'+rtxt+'</td><td style="color:'+(p.units>0?'#0d7d4d':(p.units<0?'#b3402f':'#9aa3ad'))+';font-weight:700">'+ru+'</td></tr>';});
  html+='</tbody></table></div>';
  rw.innerHTML=html;
  document.getElementById('gcnt').textContent=graded.length+' graded · '+pend+' pending';
}
function drawMarket(){
  var tw=document.getElementById('gTopWrap'), bw=document.getElementById('gTblWrap'), rw=document.getElementById('gResWrap');
  tw.style.display='none';bw.style.display='none';if(rw)rw.style.display='none';
  if(G.market==='top'){tw.style.display='grid';renderTop();}
  else if(G.market==='results'){if(rw)rw.style.display='block';renderResults();}
  else{bw.style.display='block';renderTable();}
}
function renderGambling(){
  var R=computeAll(); G.hits=R.hits;G.hr=R.hr;G.k=R.k;G.top=R.top;
  var gi=document.getElementById('ginel'); if(gi){var _m=[]; if((R.nIneH+R.nIneP)>0)_m.push((R.nIneH+R.nIneP)+' injured'); if(R.nLowH>0)_m.push(R.nLowH+' limited-role (<'+R.thr+' PA)'); gi.textContent=_m.length?('\u2298 '+_m.join(' + ')+' excluded'):'';}
  var g=document.getElementById('gdt'); if(g)g.textContent=new Date(D.date+'T12:00:00').toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});
  drawMarket();
}
function setMode(m){
  var fv=document.getElementById('fvFantasy'),gv=document.getElementById('fvGambling');
  var bf=document.getElementById('mbFV'),bg=document.getElementById('mbGB');
  if(m==='gb'){fv.style.display='none';gv.style.display='block';bf.classList.remove('on');bg.classList.add('on');renderGambling();}
  else{fv.style.display='block';gv.style.display='none';bg.classList.remove('on');bf.classList.add('on');}
}
if(!STANDALONE){
  document.getElementById('mbFV').onclick=function(){setMode('fv');};
  document.getElementById('mbGB').onclick=function(){setMode('gb');};
}
Array.prototype.forEach.call(document.querySelectorAll('#gtabs .tab'),function(t){
  t.onclick=function(){document.querySelectorAll('#gtabs .tab').forEach(function(x){x.classList.remove('active');});t.classList.add('active');G.market=t.getAttribute('data-g');G.sort={key:'lean',asc:false};drawMarket();};
});
document.getElementById('gsearch').oninput=function(){G.q=this.value.toLowerCase();drawMarket();};
if(STANDALONE){ renderGambling(); }
else if(dsel) dsel.addEventListener('change',function(){ if(document.getElementById('fvGambling').style.display!=='none') renderGambling(); });
}catch(e){ if(window.console)console.error('gambling module error',e); }
})();

</script></body></html>
