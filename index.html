function attachBin(r,mkt,modelP){if(!mkt)return;var m=mkt[r.key];if(!m||m.over==null)return;r.line=(m.line!=null?m.line:0.5);r.odds=m.over;var dv=(m.under!=null)?devig(m.over,m.under):a2p(m.over);if(dv!=null&&modelP!=null){r.edge=(modelP-dv)*100;r.mktp=dv;}}
function attachK(r,mkt){if(!mkt)return;var m=mkt[r.key];if(!m||m.over==null||m.line==null)return;r.line=m.line;r.odds=m.over;if(r.projK!=null){var mp=poissonOver(r.projK,m.line);var dv=(m.under!=null)?devig(m.over,m.under):a2p(m.over);if(dv!=null){r.edge=(mp-dv)*100;r.mktp=dv;r.modelPOver=mp;}}}
function edgeCell(e){return (e==null||isNaN(e))?PH:('<span style="color:'+(e>=0?'#0d7d4d':'#b3402f')+';font-weight:700">'+(e>0?'+':'')+e.toFixed(1)+'%</span>');}
function attachTB(r,mkt,p1,p2){if(!mkt)return;var m=mkt[r.key];if(!m)return;if(m.b1&&m.b1.over!=null){r.o1_odds=m.b1.over;var d1=(m.b1.under!=null)?devig(m.b1.over,m.b1.under):a2p(m.b1.over);if(d1!=null&&p1!=null)r.o1_edge=(p1-d1)*100;}if(m.b2&&m.b2.over!=null){r.o2_odds=m.b2.over;var d2=(m.b2.under!=null)?devig(m.b2.over,m.b2.under):a2p(m.b2.over);if(d2!=null&&p2!=null)r.o2_edge=(p2-d2)*100;}}

function computeAll(){
  var H=(D.hitters||[]); var PL=(D.pitchers||[]);
  var PM={}; PL.forEach(function(p){if(p.name)PM[p.name]=p;});
  // ---- playing-time qualifier: drop part-time bats so they can't be recommended ----
  var _pa=H.map(function(h){return num(h.pa);}).filter(function(v){return v!=null&&v>0;}).sort(function(a,b){return a-b;});
  var _p90=_pa.length?_pa[Math.min(_pa.length-1,Math.floor(0.90*_pa.length))]:0;
  var THR=Math.round(0.45*_p90); // ~half a full-timer's PA; self-scales over the season
  function reg(h){return num(h.pa)!=null && h.pa>=THR;}
  // ---- Hits / TB ----
  var pXW=mkPct(H.map(function(h){return num(h.xwoba);}));
  var pPF=mkPct(H.map(function(h){return num(h.pf);}));
  var pL7=mkPct(H.map(function(h){return num(h.spl7);}));
  var pPlat=mkPct(H.map(function(h){return num(h.spplat);}));
  function oppWeak(h){var sp=PM[h.opp_sp];return (sp&&sp.pq!=null)?(100-sp.pq):null;}
  var pOpp=mkPct(H.map(oppWeak));
  var hits=[];
  H.forEach(function(h){ if(inel(h))return; if(!reg(h))return; if(num(h.xwoba)==null)return;
    var lean=blend([[pXW(num(h.xwoba)),.42],[pOpp(oppWeak(h)),.26],[pPF(num(h.pf)),.12],[pL7(num(h.spl7)),.12],[pPlat(num(h.spplat)),.08]]);
    if(lean==null)return;
    hits.push({nm:h.name,key:normName(h.name),tm:h.team,opp:(h.home?'vs ':'@ ')+h.opp,sp:h.opp_sp||'',lean:lean*100,est:0.50+0.30*lean,xw:num(h.xwoba),slg:num(h.slg),l7:num(h.spl7),pf:num(h.pf),fa:h.avail?1:0});
  });
  hits.sort(function(a,b){return b.lean-a.lean;});
  // ---- Home runs ----
  var pBpa=mkPct(H.map(function(h){return num(h.brlpa);}));
  var pBrl=mkPct(H.map(function(h){return num(h.brl);}));
  var pMev=mkPct(H.map(function(h){return num(h.mev);}));
  function oppBarrel(h){var sp=PM[h.opp_sp];return (sp&&sp.brl!=null)?num(sp.brl):null;}
  var pOppB=mkPct(H.map(oppBarrel));
  var hr=[];
  H.forEach(function(h){ if(inel(h))return; if(!reg(h))return; if(num(h.brlpa)==null&&num(h.brl)==null)return;
    var lean=blend([[pBpa(num(h.brlpa)),.34],[pBrl(num(h.brl)),.18],[pMev(num(h.mev)),.12],[pPF(num(h.pf)),.14],[pOppB(oppBarrel(h)),.22]]);
    if(lean==null)return;
    hr.push({nm:h.name,key:normName(h.name),tm:h.team,opp:(h.home?'vs ':'@ ')+h.opp,sp:h.opp_sp||'',lean:lean*100,est:0.04+0.18*lean,brl:num(h.brl),bpa:num(h.brlpa),mev:num(h.mev),pf:num(h.pf),fa:h.avail?1:0});
  });
  hr.sort(function(a,b){return b.lean-a.lean;});
  // ---- Pitcher strikeouts ----
  var P=PL.filter(function(p){return num(p.k)!=null&&!inel(p);});
  var pK=mkPct(P.map(function(p){return num(p.k);}));
  var pRec=mkPct(P.map(function(p){return num(p.rec30);}));
  var pXWa=mkPct(P.map(function(p){return num(p.xwoba);}));
  var pOff=mkPct(P.map(function(p){return num(p.oppoff);}));
  var pPQ=mkPct(P.map(function(p){return num(p.pq);}));
  var k=[];
  P.forEach(function(p){
    var iXW=pXWa(num(p.xwoba)); iXW=(iXW==null)?null:1-iXW;
    var iOff=pOff(num(p.oppoff)); iOff=(iOff==null)?null:1-iOff;
    var lean=blend([[pK(num(p.k)),.48],[pRec(num(p.rec30)),.18],[iXW,.18],[iOff,.16]]);
    if(lean==null)return;
    var bf=21+5*(pPQ(num(p.pq))||0.5);
    var projK=num(p.k)!=null?(p.k/100*bf):null;
    k.push({nm:p.name,key:normName(p.name),tm:p.team,opp:'vs '+p.opp,lean:lean*100,projK:projK,kp:num(p.k),rec:num(p.rec30),xera:num(p.xera),ip:num(p.ip),fa:p.avail?1:0});
  });
  k.sort(function(a,b){return b.lean-a.lean;});
  var OD=(typeof ODDS_BY_DATE!=='undefined' && ODDS_BY_DATE && ODDS_BY_DATE[D.date])?ODDS_BY_DATE[D.date]:null;
  hits.forEach(function(r){ r.p1=r.est; if(r.p1!=null){var pc=Math.max(0.05,Math.min(0.97,r.p1)); var lam=-Math.log(1-pc)*Math.sqrt((r.slg!=null?r.slg:0.40)/0.40); r.p2=1-(1+lam)*Math.exp(-lam);} attachTB(r,OD&&OD.tb,r.p1,r.p2); });
  hr.forEach(function(r){attachBin(r,OD&&OD.hr,r.est);});
  k.forEach(function(r){attachK(r,OD&&OD.k);});
  // ---- Top plays (cross-market) ----
  var top=[];
  var _inR=function(o){return o!=null&&o>=-250&&o<=1000;};
  hits.filter(function(_h){return _inR(_h.o1_odds);}).slice(0,12).forEach(function(x){top.push({mk:'Hits / TB',nm:x.nm,tm:x.tm,opp:x.opp,lean:x.lean,det:'xwOBA '+f3(x.xw)+' &middot; vs '+(x.sp||'TBD'),est:'~'+Math.round((x.p1||0)*100)+'% 1+ base',edge:x.o1_edge,side:'1+ H',odds:x.o1_odds});});
  hr.filter(function(_h){return _inR(_h.odds);}).slice(0,12).forEach(function(x){top.push({mk:'Home Run',nm:x.nm,tm:x.tm,opp:x.opp,lean:x.lean,det:'Brl/PA '+f1(x.bpa)+'% &middot; '+f0(x.pf)+' PF',est:'~'+Math.round(x.est*100)+'% HR',edge:x.edge,side:'1+ HR',odds:x.odds});});
  k.filter(function(_p){return _inR(_p.odds);}).slice(0,12).forEach(function(x){top.push({mk:'Pitcher K',nm:x.nm,tm:x.tm,opp:x.opp,lean:x.lean,det:'K% '+f1(x.kp)+' &middot; Rec30 '+f0(x.rec),est:'proj '+f1(x.projK)+' K',edge:x.edge,side:'Over '+x.line+' K',odds:x.odds});});
  top.sort(function(a,b){return b.lean-a.lean;}); top=top.slice(0,9);
  var nIneH=H.filter(inel).length; var nIneP=PL.filter(function(p){return num(p.k)!=null&&inel(p);}).length;
  var nLowH=H.filter(function(h){return !inel(h)&&!reg(h);}).length;
  return {hits:hits,hr:hr,k:k,top:top,nIneH:nIneH,nIneP:nIneP,nLowH:nLowH,thr:THR};
}

function equitySVG(pts){
  if(!pts.length) return '';
  var w=700,h=120,pad=6; var mn=Math.min(0,Math.min.apply(null,pts)),mx=Math.max(0,Math.max.apply(null,pts));
  var rng=(mx-mn)||1,n=pts.length;
  function X(i){return pad+(n<=1?0:i*(w-2*pad)/(n-1));} function Y(v){return pad+(h-2*pad)*(1-(v-mn)/rng);}
  var d='M'+X(0)+' '+Y(pts[0]); for(var i=1;i<n;i++)d+=' L'+X(i)+' '+Y(pts[i]);
  var col=pts[n-1]>=0?'#0d7d4d':'#b3402f';
  return '<div style="background:#fff;border:1px solid #e1e5ea;border-radius:9px;padding:8px 10px;margin-bottom:12px"><div class="mk" style="color:#42505e;margin-bottom:4px">Cumulative units ('+n+' graded bets)</div><svg viewBox="0 0 '+w+' '+h+'" preserveAspectRatio="none" style="width:100%;height:120px"><line x1="'+pad+'" y1="'+Y(0)+'" x2="'+(w-pad)+'" y2="'+Y(0)+'" stroke="#cdd3da" stroke-dasharray="3 3"/><path d="'+d+'" fill="none" stroke="'+col+'" stroke-width="2"/></svg></div>';
}
function renderResults(){
  var rw=document.getElementById('gResWrap');
  var P=(typeof RESULTS!=='undefined'&&RESULTS)?RESULTS:[];
  var graded=P.filter(function(p){return p.status==='win'||p.status==='loss';});
  var pend=P.filter(function(p){return p.status==='pending';}).length;
  function stats(list){var w=0,l=0,u=0;list.forEach(function(p){if(p.status==='win')w++;else if(p.status==='loss')l++;u+=(p.units||0);});var n=w+l;return {w:w,l:l,u:u,roi:n?100*u/n:0};}
  function uc(u){return u>=0?'#0d7d4d':'#b3402f';}
  function card(t,st){return '<div class="gcard" style="border-left-color:'+uc(st.u)+'"><div class="mk">'+t+'</div><div class="pl" style="color:'+uc(st.u)+'">'+(st.u>=0?'+':'')+st.u.toFixed(2)+'u</div><div class="dt2">'+st.w+'W&ndash;'+st.l+'L &middot; ROI '+(st.roi>=0?'+':'')+st.roi.toFixed(1)+'%</div></div>';}
  var html='<div class="gnote">Paper backtest &mdash; <b>1 unit flat</b> on every Top Play (the model&#39;s side) at the recorded odds, graded from final MLB box scores. Days before live tracking use closing lines. For evaluation only; not financial advice.</div>';
  html+='<div class="gcards">'+card('All Top Plays',stats(graded))+card('Positive-Edge Only',stats(graded.filter(function(p){return p.edge!=null&&p.edge>0;})));
  ['Hits / TB','Home Run','Pitcher K'].forEach(function(mk){html+=card(mk,stats(graded.filter(function(p){return p.market===mk;})));});
  html+='</div>';
  var seq=graded.slice().sort(function(a,b){return a.date<b.date?-1:a.date>b.date?1:0;});
  var cum=0,pts=seq.map(function(p){cum+=(p.units||0);return cum;});
  html+=equitySVG(pts);
  var rows=P.slice().sort(function(a,b){return a.date<b.date?1:(a.date>b.date?-1:0);});
  html+='<div class="tablewrap" style="max-height:60vh"><table><thead><tr><th class="l">Date</th><th class="l">Market</th><th class="name l">Player</th><th class="l">Bet</th><th>Odds</th><th>Edge</th><th>Stat</th><th>Result</th><th>Units</th></tr></thead><tbody>';
  rows.forEach(function(p){var st=p.status; var rc=st==='win'?'#0d7d4d':st==='loss'?'#b3402f':'#9aa3ad'; var ru=p.units==null?'':((p.units>0?'+':'')+(+p.units).toFixed(2)); var rtxt=st==='pending'?'pending':st==='void'?'void':(st==='win'?'WIN':'LOSS'); var ed=(p.edge==null?'':((p.edge>0?'+':'')+p.edge.toFixed(1)+'%'));
    html+='<tr><td class="l">'+p.date.slice(5)+'</td><td class="l">'+p.market+'</td><td class="name l">'+p.player+'</td><td class="l">'+p.side+'</td><td>'+(p.odds!=null?((p.odds>0?'+':'')+p.odds):'')+'</td><td style="color:'+(p.edge>0?'#0d7d4d':'#b3402f')+'">'+ed+'</td><td>'+(p.result==null?'':p.result)+'</td><td style="color:'+rc+';font-weight:700">'+rtxt+'</td><td style="color:'+(p.units>0?'#0d7d4d':(p.units<0?'#b3402f':'#9aa3ad'))+';font-weight:700">'+ru+'</td></tr>';});
  html+='</tbody></table></div>';
  rw.innerHTML=html;
  document.getElementById('gcnt').textContent=graded.length+' graded · '+pend+' pending';
}
function drawMarket(){
  var tw=document.getElementById('gTopWrap'), bw=document.getElementById('gTblWrap'), rw=document.getElementById('gResWrap');
  tw.style.display='none';bw.style.display='none';if(rw)rw.style.display='none';
  if(G.market==='top'){tw.style.display='grid';renderTop();}
  else if(G.market==='results'){if(rw)rw.style.display='block';renderResults();}
  else{bw.style.display='block';renderTable();}
}
function renderGambling(){
  var R=computeAll(); G.hits=R.hits;G.hr=R.hr;G.k=R.k;G.top=R.top;
  var gi=document.getElementById('ginel'); if(gi){var _m=[]; if((R.nIneH+R.nIneP)>0)_m.push((R.nIneH+R.nIneP)+' injured'); if(R.nLowH>0)_m.push(R.nLowH+' limited-role (<'+R.thr+' PA)'); gi.textContent=_m.length?('\u2298 '+_m.join(' + ')+' excluded'):'';}
  var g=document.getElementById('gdt'); if(g)g.textContent=new Date(D.date+'T12:00:00').toLocaleDateString('en-US',{weekday:'long',month:'long',day:'numeric',year:'numeric'});
  drawMarket();
}
function setMode(m){
  var fv=document.getElementById('fvFantasy'),gv=document.getElementById('fvGambling');
  var bf=document.getElementById('mbFV'),bg=document.getElementById('mbGB');
  if(m==='gb'){fv.style.display='none';gv.style.display='block';bf.classList.remove('on');bg.classList.add('on');renderGambling();}
  else{fv.style.display='block';gv.style.display='none';bg.classList.remove('on');bf.classList.add('on');}
}
if(!STANDALONE){
  document.getElementById('mbFV').onclick=function(){setMode('fv');};
  document.getElementById('mbGB').onclick=function(){setMode('gb');};
}
Array.prototype.forEach.call(document.querySelectorAll('#gtabs .tab'),function(t){
  t.onclick=function(){document.querySelectorAll('#gtabs .tab').forEach(function(x){x.classList.remove('active');});t.classList.add('active');G.market=t.getAttribute('data-g');G.sort={key:'lean',asc:false};drawMarket();};
});
document.getElementById('gsearch').oninput=function(){G.q=this.value.toLowerCase();drawMarket();};
if(STANDALONE){ renderGambling(); }
else if(dsel) dsel.addEventListener('change',function(){ if(document.getElementById('fvGambling').style.display!=='none') renderGambling(); });
}catch(e){ if(window.console)console.error('gambling module error',e); }
})();

</script></body></html>
