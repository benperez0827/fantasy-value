'<p class="sub">Model-driven prop leans built from the same Statcast + matchup engine as the value model. Each spot is ranked 0&ndash;100 by the metrics that drive that prop. POC v1.</p>'+
'<div class="gnote"><b>How to read this:</b> these are <b>model leans</b>, not odds-derived edges. The engine ranks each spot 0&ndash;100 by the inputs that move that prop (contact quality, matchup vs today&#39;s starter, park, recent form). The <b>Line / Odds / Edge</b> columns show prop lines via <b>SportsGameOdds</b> (FanDuel when available, otherwise market consensus) once an odds key is configured; <b>Edge</b> = model probability &minus; the de-vigged implied probability (positive = model sees value; strikeout edge uses a Poisson model around the posted line). Free-tier lines may be ~10 min delayed. The Hits/TB tab lists odds for <b>1+ hits</b> and <b>2+ total bases</b> &mdash; two different bets &mdash; with an edge beside each (model probabilities are rough estimates: 1+ hits uses the model&#39;s hit probability; 2+ total bases scales it by the batter&#39;s power (SLG)). The <b>Pitcher Props</b> tab covers three starter bets: strikeouts (Over, Poisson around the line &mdash; now adjusted for the <b>opposing lineup&#39;s K%</b> split by the pitcher&#39;s handedness, the lineup&#39;s home/away role, and its last-30-day form), <b>outs recorded</b> (Over, from the model&#39;s projected innings) and <b>earned runs</b> (Under, from expected ERA over projected innings) &mdash; each with its own odds and edge. <b>Ineligible players</b> (IL, bereavement, paternity, or DTD) are excluded from all leans and Top Plays. <b>Limited-role bats</b> (low season plate appearances) are also held out so part-timers don&#39;t surface as plays. <b>Top Plays additionally require an everyday job</b> (&ge;70% of a full-timer&#39;s PA): platoon bats who sit vs same-hand starters or get lifted mid-game stay on the market tabs but are never recommended. Model %/projections are rough estimates, not guarantees. <b>Top Plays</b> are the model&#39;s sweet-spot bets: a strong model lean (&ge;65) AND a positive edge, ranked by a blend of the two and capped at 3 per market. Both overs and unders are considered, but <b>unders only on pitcher props</b> (K/Outs) since FanDuel doesn&#39;t post hitter unders; for an under, &lsquo;conviction&rsquo; is the inverse lean (a pitcher the model strongly fades). Home-run props use a richer power profile (barrels/PA, hard-hit%, exit velo, bat speed, SLG) plus heavy splits weighting &mdash; platoon (vs the starter&#39;s hand), home/away power, ballpark HR-friendliness, and batter-vs-starter history &mdash; and a recalibrated HR-probability curve (convex: elite power ~24-29%, weak ~6-8%) fit so HR edges are no longer systematically negative without inflating weak-hitter longshots. Hit/TB props are likewise calibrated from the backtest: 1+ hit probabilities are deflated (the model was over-confident on favorites, ~80% predicted vs ~67% actual) and 2+ total-base probabilities are boosted (under-rated like HR). All FanDuel-offered markets qualify (earned-run props are excluded since FanDuel doesn&#39;t post them). <b>Top Plays now use FanDuel odds only</b> &mdash; a play is included only when we have FanDuel&#39;s price; if only market consensus is available it&#39;s left out (you can still see it on the market tabs, tagged <b>cons</b>). For entertainment; please bet responsibly.</div>'+

function computeAll(){

  function lineupOK(h){ if(!LU||!LU.teams)return true; if(LU.teams.indexOf(h.team)<0)return true; return _starters[normName(h.name)]===1; }
  // ---- playing-time qualifier: drop part-time bats so they can't be recommended ----
  var _pa=H.map(function(h){return num(h.pa);}).filter(function(v){return v!=null&&v>0;}).sort(function(a,b){return a-b;});

  function reg(h){return num(h.pa)!=null && h.pa>=THR;}

  // sit vs same-hand starters and get lifted mid-game for pinch hitters -- their per-game PA is
  // unreliable, so they stay visible on the market tabs but can't surface as Top Plays.
  // NOTE: also briefly holds out everyday bats returning from long IL stints until season PA share recovers.
  var EVR=Math.round(0.70*_p90);
  function everyday(h){return num(h.pa)!=null && h.pa>=EVR;}
  // ---- Hits / TB ----
  var pXW=mkPct(H.map(function(h){return num(h.xwoba);}));
  var pSLG=mkPct(H.map(function(h){return num(h.slg);}));
  var pPF=mkPct(H.map(function(h){return num(h.pf);}));
  var pL7=mkPct(H.map(function(h){return num(h.spl7);}));
  var pPlat=mkPct(H.map(function(h){return num(h.spplat);}));

  var hits=[];
  H.forEach(function(h){ if(inel(h))return; if(!reg(h))return; if(!lineupOK(h))return; if(num(h.xwoba)==null)return;
    var lean=blend([[pXW(num(h.xwoba)),.34],[pOpp(oppWeak(h)),.22],[pPlat(num(h.spplat)),.16],[pHA(num(h.spha)),.14],[pPF(num(h.pf)),.08],[pL7(num(h.spl7)),.06]]);
    if(lean==null)return;

  var pBrl=mkPct(H.map(function(h){return num(h.brl);}));
  var pMev=mkPct(H.map(function(h){return num(h.mev);}));
  var pHH=mkPct(H.map(function(h){return num(h.hh);}));

  var _lk=[]; if(TK){for(var _tt in TK){if(TK[_tt]&&TK[_tt].ks!=null)_lk.push(TK[_tt].ks);}}
  var leagueK=_lk.length?(_lk.reduce(function(a,b){return a+b;},0)/_lk.length):22.0;
  function oppAdjK(p){ if(!TK)return null; var t=TK[p.opp]; if(!t)return null;

  hits.forEach(function(r){var ln=blend([[pSLG(r.slg),.20],[pBpa(r.bpa),.14],[pPlat(r.spplat),.14],[pHA(r.spha),.12],[pL7(r.l7),.10],[pBvP(r.spbvp),.08],[pXW(r.xw),.08],[pOpp(r.ow),.06],[pMev(r.mev),.04],[pPF(r.pf),.04]]); r.tbLean=(ln==null?null:ln*100);});
  // ---- Top plays (cross-market) ----
  var _inR=function(o){return o!=null&&o>=-250&&o<=1000;};
  function _card(x,mk){
    if(mk==='Hits / TB')return {mk:mk,nm:x.nm,tm:x.tm,opp:x.opp,lean:x.lean,det:'xwOBA '+f3(x.xw)+' &middot; vs '+(x.sp||'TBD'),est:'~'+Math.round((x.p1||0)*100)+'% 1+ base',edge:x.o1_edge,side:'1+ H',odds:x.o1_odds,book:x.o1_book};
    if(mk==='Total Bases')return {mk:mk,nm:x.nm,tm:x.tm,opp:x.opp,lean:x.tbLean,det:'SLG '+f3(x.slg)+' &middot; Brl/PA '+f1(x.bpa)+'%',est:'~'+Math.round((x.p2||0)*100)+'% 2+ TB',edge:x.o2_edge,side:'2+ TB',odds:x.o2_odds,book:x.o2_book};
    if(mk==='Home Run')return {mk:mk,nm:x.nm,tm:x.tm,opp:x.opp,lean:x.lean,det:'Brl/PA '+f1(x.bpa)+'% &middot; '+f0(x.pf)+' PF',est:'~'+Math.round(x.est*100)+'% HR',edge:x.edge,side:'1+ HR',odds:x.odds,book:x.hr_book};
    if(mk==='Pitcher Outs')return {mk:mk,nm:x.nm,tm:x.tm,opp:x.opp,lean:x.outsLean,det:'~'+f1(x.projIP)+' IP proj &middot; PQ '+f0(x.pq),est:'~'+Math.round((x.outs_p||0)*100)+'% over',edge:x.outs_edge,side:'Over '+x.outs_line+' Outs',odds:x.outs_odds,book:x.outs_book};
    if(mk==='Pitcher ER')return {mk:mk,nm:x.nm,tm:x.tm,opp:x.opp,lean:x.erLean,det:'xERA '+f2(x.xera)+' &middot; ~'+f1(x.projIP)+' IP proj',est:'~'+Math.round((x.er_p||0)*100)+'% under',edge:x.er_edge,side:'Under '+x.er_line+' ER',odds:x.er_odds};
    return {mk:mk,nm:x.nm,tm:x.tm,opp:x.opp,lean:x.lean,det:'K% '+f1(x.kp)+' &middot; Rec30 '+f0(x.rec),est:'proj '+f1(x.projK)+' K',edge:x.edge,side:'Over '+x.line+' K',odds:x.odds,book:x.k_book};
  }
  // Rank by betting EDGE (value). Guardrail: pitcher props require durability (outsLean>=DURA)
  // so relievers/openers/short-leash starters (generic-workload projection inflates their edge) are excluded.
  // TAB = the user's bettable set: FanDuel-listed prices only, edge >= MINEDGE (safety margin vs model error).
  // (The Results log uses its own selection incl. consensus odds for the shareable backtest.)
  // SWEET SPOT: require BOTH a good model lean (>=LEANMIN) AND a positive edge, then rank by a blend of the two
  // (so conviction isn't sacrificed for marginal-edge longshots). Pitchers also need durability. Cap 3/market.
  // All FanDuel-offered markets qualify (ER excluded); odds are best-available (FanDuel for K/Outs, else consensus).
  var DURA=50, LEANMIN=65, W=0.12, HREDGE=-3;
  var _cand=[];
  // Side-aware: an under's edge == -(over edge) (symmetric de-vig) and its conviction is the inverse lean (100-lean).
  // Pick the +EV side: over when over-edge>0 (conviction=lean), else the under (conviction=100-lean). Gate the chosen side by the floor.
  function _push(x,mk,ln,oe,oo,uo,ol,ul,au,me,bk){ if(oe==null||ln==null)return;
    if(bk!=='fanduel')return; // user bets FanDuel only: include a play only when we have FanDuel's price
    if(!au&&!x.evr)return; // hitter Top Plays require an everyday job (no platoon/part-time bats)
    var isU=oe<0; if(isU&&!au)return; // unders only for pitcher markets (FanDuel doesn't post hitter unders)
    var edge=isU?-oe:oe, odds=isU?uo:oo, conv=isU?(100-ln):ln, lab=isU?ul:ol;
    if(edge<(me==null?0:me)||conv<LEANMIN||!_inR(odds))return;
    var c=_card(x,mk); c.lean=conv; c.edge=edge; c.odds=odds; c.side=lab; if(isU)c.est='model fade'; c.score=edge+W*(conv-50); _cand.push(c); }
  hits.forEach(function(x){ _push(x,'Hits / TB',x.lean,x.o1_edge,x.o1_odds,x.o1_und,'1+ H','0 Hits',false,0,x.o1_book); if(x.tbLean!=null)_push(x,'Total Bases',x.tbLean,x.o2_edge,x.o2_odds,x.o2_und,'2+ TB','Under 1.5 TB',false,0,x.o2_book); });
  hr.forEach(function(x){ _push(x,'Home Run',x.lean,x.edge,x.odds,x.hr_und,'1+ HR','No HR',false,HREDGE,x.hr_book); });
  k.forEach(function(x){ if(x.outsLean!=null&&x.outsLean>=DURA){ _push(x,'Pitcher K',x.lean,x.edge,x.odds,x.k_und,'Over '+x.line+' K','Under '+x.line+' K',true,0,x.k_book); _push(x,'Pitcher Outs',x.outsLean,x.outs_edge,x.outs_odds,x.outs_und,'Over '+x.outs_line+' Outs','Under '+x.outs_line+' Outs',true,0,x.outs_book); } });
  _cand.sort(function(a,b){return (b.score==null?-1e9:b.score)-(a.score==null?-1e9:a.score);});
  var _cap=3,_seen={},top=[];
  for(var _c=0;_c<_cand.length&&top.length<9;_c++){var _mk=_cand[_c].mk;_seen[_mk]=_seen[_mk]||0;if(_seen[_mk]>=_cap)continue;_seen[_mk]++;top.push(_cand[_c]);}
  var nIneH=H.filter(inel).length; var nIneP=PL.filter(function(p){return num(p.k)!=null&&inel(p);}).length;
  var nLowH=H.filter(function(h){return !inel(h)&&!reg(h);}).length;
  return {hits:hits,hr:hr,k:k,top:top,nIneH:nIneH,nIneP:nIneP,nLowH:nLowH,thr:THR};
}

function equitySVG(pts){
  if(!pts.length) return '';
  var w=700,h=120,pad=6; var mn=Math.min(0,Math.min.apply(null,pts)),mx=Math.max(0,Math.max.apply(null,pts));
  var rng=(mx-mn)||1,n=pts.length;
  function X(i){return pad+(n<=1?0:i*(w-2*pad)/(n-1));} function Y(v){return pad+(h-2*pad)*(1-(v-mn)/rng);}
  var d='M'+X(0)+' '+Y(pts[0]); for(var i=1;i<n;i++)d+=' L'+X(i)+' '+Y(pts[i]);
  var col=pts[n-1]>=0?'#0d7d4d':'#b3402f';
  return '<div style="background:#fff;border:1px solid #e1e5ea;border-radius:9px;padding:8px 10px;margin-bottom:12px"><div class="mk" style="color:#42505e;margin-bottom:4px">Cumulative units ('+n+' graded bets)</div><svg viewBox="0 0 '+w+' '+h+'" preserveAspectRatio="none" style="width:100%;height:120px"><line x1="'+pad+'" y1="'+Y(0)+'" x2="'+(w-pad)+'" y2="'+Y(0)+'" stroke="#cdd3da" stroke-dasharray="3 3"/><path d="'+d+'" fill="none" stroke="'+col+'" stroke-width="2"/></svg></div>';
}
function renderResults(){
  var rw=document.getElementById('gResWrap');
  var P=(typeof RESULTS!=='undefined'&&RESULTS)?RESULTS:[];
  var graded=P.filter(function(p){return p.status==='win'||p.status==='loss';});
  var pend=P.filter(function(p){return p.status==='pending';}).length;
  function stats(list){var w=0,l=0,u=0;list.forEach(function(p){if(p.status==='win')w++;else if(p.status==='loss')l++;u+=(p.units||0);});var n=w+l;return {w:w,l:l,u:u,roi:n?100*u/n:0};}
  function uc(u){return u>=0?'#0d7d4d':'#b3402f';}
  function card(t,st){return '<div class="gcard" style="border-left-color:'+uc(st.u)+'"><div class="mk">'+t+'</div><div class="pl" style="color:'+uc(st.u)+'">'+(st.u>=0?'+':'')+st.u.toFixed(2)+'u</div><div class="dt2">'+st.w+'W&ndash;'+st.l+'L &middot; ROI '+(st.roi>=0?'+':'')+st.roi.toFixed(1)+'%</div></div>';}
  var html='<div class="gnote">Paper backtest &mdash; <b>1 unit flat</b> on every Top Play (the model&#39;s side) at the recorded odds, graded from final MLB box scores. Days before live tracking use closing lines. For evaluation only; not financial advice.</div>';
  html+='<div class="gcards">'+card('All Top Plays',stats(graded))+card('Positive-Edge Only',stats(graded.filter(function(p){return p.edge!=null&&p.edge>0;})));
  ['Hits / TB','Total Bases','Home Run','Pitcher K','Pitcher Outs','Pitcher ER'].forEach(function(mk){html+=card(mk,stats(graded.filter(function(p){return p.market===mk;})));});
  html+='</div>';
  var seq=graded.slice().sort(function(a,b){return a.date<b.date?-1:a.date>b.date?1:0;});
  var cum=0,pts=seq.map(function(p){cum+=(p.units||0);return cum;});
  html+=equitySVG(pts);
  var rows=P.slice().sort(function(a,b){return a.date<b.date?1:(a.date>b.date?-1:0);});
  html+='<div class="tablewrap" style="max-height:60vh"><table><thead><tr><th class="l">Date</th><th class="l">Market</th><th class="name l">Player</th><th class="l">Bet</th><th>Odds</th><th>Edge</th><th>Stat</th><th>Result</th><th>Units</th></tr></thead><tbody>';
  rows.forEach(function(p){var st=p.status; var rc=st==='win'?'#0d7d4d':st==='loss'?'#b3402f':'#9aa3ad'; var ru=p.units==null?'':((p.units>0?'+':'')+(+p.units).toFixed(2)); var rtxt=st==='pending'?'pending':st==='void'?'void':(st==='win'?'WIN':'LOSS'); var ed=(p.edge==null?'':((p.edge>0?'+':'')+p.edge.toFixed(1)+'%'));
    html+='<tr><td class="l">'+p.date.slice(5)+'</td><td class="l">'+p.market+'</td><td class="name l">'+p.player+'</td><td class="l">'+p.side+'</td><td>'+(p.odds!=null?((p.odds>0?'+':'')+p.odds):'')+'</td><td style="color:'+(p.edge>0?'#0d7d4d':'#b3402f')+'">'+ed+'</td><td>'+(p.result==null?'':p.result)+'</td><td style="color:'+rc+';font-weight:700">'+rtxt+'</td><td style="color:'+(p.units>0?'#0d7d4d':(p.units<0?'#b3402f':'#9aa3ad'))+';font-weight:700">'+ru+'</td></tr>';});
  html+='</tbody></table></div>';
  rw.innerHTML=html;
  document.getElementById('gcnt').textContent=graded.length+' graded · '+pend+' pending';
}
